name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Configure git identity (test fixtures need it)
        run: |
          git config --global user.name "Ostracon CI"
          git config --global user.email "ci@chriscase.cc"
      # npm install (not ci) — the local lock file was generated on macOS
      # which doesn't pull in linux-specific optional deps like @emnapi/*.
      # CI on ubuntu-latest needs them, so let install resolve. Once we
      # have a Linux dev workflow + a regenerated lock, switch back to ci.
      - run: npm install --no-audit --no-fund
      - run: npm run type-check
      - run: npm test
